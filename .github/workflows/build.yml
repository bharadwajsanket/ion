name: Build & Release ion

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ========================
      # Install compilers
      # ========================

      - name: Setup compiler (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Setup compiler (Mac)
        if: matrix.os == 'macos-latest'
        run: brew install gcc || true

      - name: Setup compiler (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      # ========================
      # Build binaries
      # ========================

      - name: Build (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: g++ -std=c++17 src/main.cpp -o ion

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: cl /std:c++17 src\main.cpp /Fe:ion.exe

      # ========================
      # Rename outputs
      # ========================

      - name: Rename binaries
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then mv ion ion-mac; fi
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then mv ion ion-linux; fi

      # ========================
      # Upload artifacts
      # ========================

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            ion-mac
            ion-linux
            ion.exe
          if-no-files-found: ignore

  # ========================
  # Release job
  # ========================

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Show files (debug)
        run: ls -R

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/ion-mac
            **/ion-linux
            **/ion.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}