name: Build & Release ion

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up compiler (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Set up compiler (Mac)
        if: matrix.os == 'macos-latest'
        run: brew install gcc || true

      - name: Set up compiler (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build (Unix)
        if: matrix.os != 'windows-latest'
        run: g++ -std=c++17 src/main.cpp -o ion

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: cl /std:c++17 src\main.cpp /Fe:ion.exe

      - name: Rename binaries
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then mv ion ion-mac; fi
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then mv ion ion-linux; fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            ion-mac
            ion-linux
            ion.exe

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Debug files
        run: ls -R

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            */ion-mac
            */ion-linux
            */ion.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}