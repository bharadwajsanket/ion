name: Build ion (multi-platform)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up compiler (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Set up compiler (Mac)
        if: matrix.os == 'macos-latest'
        run: brew install gcc || true

      - name: Set up compiler (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build ion (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          g++ -std=c++17 src/main.cpp -o ion

      - name: Build ion (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cl /std:c++17 src\main.cpp /Fe:ion.exe

      - name: Upload binary (Unix)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ion-${{ matrix.os }}
          path: ion

      - name: Upload binary (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ion-windows
          path: ion.exe
